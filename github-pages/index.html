  'PDO': 'logo-pdo', 'INOC': 'logo-inoc', 'NIOC': 'logo-nioc',
  'Dragon Oil': 'logo-dragon', 'Petrofac': 'logo-petrofac'
};

function abbr(name) {
  const map = {'Saudi Aramco':'SA','QatarEnergy':'QE','QatarEnergy LNG':'QL','North Oil Company':'NO',
    'TotalEnergies':'TE','Baker Hughes':'BH','OQ Group':'OQ','Dragon Oil':'DO','ExxonMobil':'XOM'};
  return map[name] || name.substring(0,2).toUpperCase();
}

function init() {
  document.getElementById('totalJobs').textContent = DATA.jobs.length;
  document.getElementById('totalCompanies').textContent = DATA.companies.length;
  document.getElementById('totalCountries').textContent = DATA.countries.length;
  const cf = document.getElementById('companyFilter');
  DATA.companies.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; cf.appendChild(o); });
  const ctf = document.getElementById('countryFilter');
  DATA.countries.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; ctf.appendChild(o); });
  const catf = document.getElementById('categoryFilter');
  DATA.categories.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; catf.appendChild(o); });
  document.getElementById('searchInput').addEventListener('input', () => { currentPage = 1; render(); });
  document.getElementById('companyFilter').addEventListener('change', () => { currentPage = 1; render(); });
  document.getElementById('countryFilter').addEventListener('change', () => { currentPage = 1; render(); });
  document.getElementById('categoryFilter').addEventListener('change', () => { currentPage = 1; render(); });
  render();
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const co = document.getElementById('companyFilter').value;
  const ct = document.getElementById('countryFilter').value;
  const cat = document.getElementById('categoryFilter').value;
  let results = DATA.jobs.filter(j => {
    if (co && j.company !== co) return false;
    if (ct && j.country !== ct) return false;
    if (cat && j.category !== cat) return false;
    if (q && !(j.title.toLowerCase().includes(q) || j.company.toLowerCase().includes(q) || j.location.toLowerCase().includes(q) || j.category.toLowerCase().includes(q))) return false;
    return true;
  });
  results.sort((a, b) => {
    if (currentSort === 'company') return a.company.localeCompare(b.company) || a.title.localeCompare(b.title);
    if (currentSort === 'title') return a.title.localeCompare(b.title);
    if (currentSort === 'country') return a.country.localeCompare(b.country) || a.company.localeCompare(b.company);
    return 0;
  });
  return results;
}

function render() {
  filtered = getFiltered();
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
  if (currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage - 1) * PER_PAGE;
  const page = filtered.slice(start, start + PER_PAGE);

  document.getElementById('resultsCount').innerHTML = `Showing <span>${page.length}</span> of <span>${total}</span> jobs`;

  const grid = document.getElementById('jobGrid');
  if (page.length === 0) {
    grid.innerHTML = '<div class="no-results"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg><h3>No jobs found</h3><p>Try adjusting your filters or search terms</p></div>';
  } else {
    grid.innerHTML = page.map(j => `
      <div class="job-card">
        <div class="job-logo ${logoMap[j.company]||'logo-default'}">${abbr(j.company)}</div>
        <div class="job-main">
          <div class="job-title">${esc(j.title)}</div>
          <div class="job-company">${esc(j.company)}</div>
          <div class="job-meta">
            <div class="job-meta-item"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>${esc(j.location)}</div>
            <div class="job-meta-item"><svg viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>${esc(j.country)}</div>
            <span class="job-category">${esc(j.category)}</span>
          </div>
        </div>
        <a class="job-apply" href="${esc(j.link)}" target="_blank" rel="noopener">View</a>
      </div>
    `).join('');
  }

  const tags = [];
  const co = document.getElementById('companyFilter').value;
  const ct = document.getElementById('countryFilter').value;
  const cat = document.getElementById('categoryFilter').value;
  const q = document.getElementById('searchInput').value;
  if (co) tags.push({label: co, clear: () => { document.getElementById('companyFilter').value=''; currentPage=1; render(); }});
  if (ct) tags.push({label: ct, clear: () => { document.getElementById('countryFilter').value=''; currentPage=1; render(); }});
  if (cat) tags.push({label: cat, clear: () => { document.getElementById('categoryFilter').value=''; currentPage=1; render(); }});
  if (q) tags.push({label: '"'+q+'"', clear: () => { document.getElementById('searchInput').value=''; currentPage=1; render(); }});
  const af = document.getElementById('activeFilters');
  af.innerHTML = tags.map((t,i) => `<span class="filter-tag">${esc(t.label)}<button onclick="clearTag(${i})">\u00d7</button></span>`).join('');
  window._tagClears = tags.map(t => t.clear);

  const pg = document.getElementById('pagination');
  if (totalPages <= 1) { pg.innerHTML = ''; return; }
  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>\u2190 Prev</button>`;
  const range = [];
  range.push(1);
  for (let i = Math.max(2, currentPage-2); i <= Math.min(totalPages-1, currentPage+2); i++) range.push(i);
  if (totalPages > 1) range.push(totalPages);
  const unique = [...new Set(range)].sort((a,b)=>a-b);
  let prev = 0;
  unique.forEach(p => {
    if (p - prev > 1) html += '<span style="color:var(--muted);padding:0 4px">...</span>';
    html += `<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
    prev = p;
  });
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>Next \u2192</button>`;
  pg.innerHTML = html;
}

function goPage(p) { currentPage = p; render(); window.scrollTo({top: 400, behavior:'smooth'}); }
function setSort(btn) {
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentSort = btn.dataset.sort;
  currentPage = 1;
  render();
}
function clearFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('companyFilter').value = '';
  document.getElementById('countryFilter').value = '';
  document.getElementById('categoryFilter').value = '';
  currentPage = 1;
  render();
}
function clearTag(i) { if (window._tagClears && window._tagClears[i]) window._tagClears[i](); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

init();
</script>
</body>
</html>
